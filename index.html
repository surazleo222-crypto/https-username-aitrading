<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto AI Trading Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Crypto AI Trading Dashboard</h1>
    </header>
    <main>
        <section id="trading-signals">
            <h2>Trading Signals</h2>
            <div id="signals-list">
                <!-- Dynamic trading signals will be rendered here -->
            </div>
        </section>
        <section id="user-profile">
            <h2>User Profile</h2>
            <p id="user-name">User: <span></span></p>
        </section>
        <section id="portfolio">
            <h2>Your Portfolio</h2>
            <div id="portfolio-summary">
                <!-- Portfolio summary details -->
            </div>
        </section>
    </main>
    <footer>
        <p>© 2026 Crypto AI Trading</p>
    </footer>
</body>
</html>
